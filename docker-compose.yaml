services:
  db:
    image: postgis/postgis:16-3.4
    container_name: amenities_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-amenities_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d  # runs .sql files on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-amenities_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_test:
    image: postgis/postgis:16-3.4
    container_name: amenities_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: amenities_test
    ports:
      - "5433:5432"  # different port so it doesn't clash with dev db
    tmpfs:
      - /var/lib/postgresql/data  # in-memory, wiped on container stop — perfect for tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d amenities_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: amenities_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
  web:
      image: node:lts
      working_dir: /home/node/app
      env_file: .env
      environment:
        - NODE_ENV=development
      depends_on:
        - db
      ports:
        - '3000:3000'
      volumes:
        - ./:/home/node/app
        - /home/node/app/node_modules
      command: npm run testandrun #sh -c "sleep 5 && npm install && npm start"

volumes:
  postgres_data:
    driver: local
